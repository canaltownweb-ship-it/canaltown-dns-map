<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Canaltown Digital DNS Propagation Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    :root {
        --bg: #05070b;
        --panel: #0b1018;
        --accent: #3ea8ff;
        --accent-soft: rgba(62,168,255,0.35);
        --good: #00e38a;
        --bad: #ff4b5c;
        --pending: #f6c453;
        --text-main: #d7e9ff;
        --text-soft: #7b8aa5;
        --border-subtle: #1b2433;
        --canaltown-blue: #2f7fff;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, #10182a 0, #05070b 55%, #020308 100%);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
        color: var(--text-main);
        display: flex;
        justify-content: center;
        padding: 32px 16px;
    }

    #dns-app {
        width: 100%;
        max-width: 980px;
        background: radial-gradient(circle at top left, rgba(47,127,255,0.18), transparent 55%),
                    radial-gradient(circle at bottom right, rgba(0,227,138,0.12), transparent 60%),
                    var(--panel);
        border-radius: 18px;
        border: 1px solid var(--border-subtle);
        box-shadow: 0 24px 80px rgba(0,0,0,0.65);
        padding: 20px 20px 18px;
        position: relative;
        overflow: hidden;
    }

    #dns-header-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        margin-bottom: 14px;
    }

    #dns-brand {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 180px;
    }

    #dns-brand-title {
        font-size: 0.9rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-soft);
    }

    #dns-brand-main {
        font-size: 1.05rem;
        font-weight: 600;
        color: var(--canaltown-blue);
    }

    #dns-input-wrap {
        flex: 1;
        display: flex;
        gap: 8px;
        min-width: 220px;
    }

    #dns-domain {
        flex: 1;
        padding: 10px 12px;
        background: #05070b;
        border-radius: 10px;
        border: 1px solid var(--border-subtle);
        color: var(--text-main);
        font-size: 0.95rem;
        outline: none;
    }

    #dns-domain::placeholder {
        color: #4b566b;
    }

    #dns-check-btn {
        padding: 10px 16px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(135deg, var(--canaltown-blue), #4fd1ff);
        color: white;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        white-space: nowrap;
        box-shadow: 0 0 18px rgba(47,127,255,0.55);
    }

    #dns-check-btn:disabled {
        opacity: 0.6;
        cursor: default;
        box-shadow: none;
    }

    #dns-meta-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
        font-size: 0.8rem;
        color: var(--text-soft);
    }
