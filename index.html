<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>DNS Propagation Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
    body {
        margin: 0;
        background: #0a0a0a;
        color: #e0e0e0;
        font-family: Arial, sans-serif;
        display: flex;
        height: 100vh;
        overflow: hidden;
    }

    /* LEFT PANEL */
    #leftPanel {
        width: 360px;
        background: #111;
        border-right: 1px solid #222;
        padding: 20px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    /* DOMAIN INPUT */
    #domainInputContainer {
        display: flex;
        gap: 8px;
    }

    #domainField {
        flex: 1;
        padding: 10px;
        background: #1a1a1a;
        border: 1px solid #333;
        color: #e0e0e0;
        border-radius: 4px;
        font-size: 14px;
    }

    #runBtn {
        width: 48px;
        background: #00ff88;
        border: none;
        border-radius: 4px;
        color: #000;
        font-size: 20px;
        cursor: pointer;
        font-weight: bold;
    }

    #runBtn:hover {
        background: #00cc6a;
    }

    /* STATUS LABEL */
    #statusLabel {
        font-size: 14px;
        color: #00ff88;
        margin-top: -10px;
    }

    /* METRICS */
    #metrics {
        background: #1a1a1a;
        padding: 12px;
        border-radius: 6px;
        border: 1px solid #222;
        font-size: 14px;
    }

    /* TABLE */
    #resolverTable {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
    }

    #resolverTable th, #resolverTable td {
        padding: 6px;
        border-bottom: 1px solid #222;
    }

    #resolverTable th {
        color: #00ff88;
        text-align: left;
    }

    /* RIGHT PANEL */
    #rightPanel {
        flex: 1;
        position: relative;
        background: #000;
    }

    #mapCanvas {
        width: 100%;
        height: 100%;
        display: block;
    }
</style>
</head>

<body>

<!-- LEFT PANEL -->
<div id="leftPanel">

    <!-- DOMAIN INPUT -->
    <div id="domainInputContainer">
        <input id="domainField" type="text" placeholder="enter domain name" />
        <button id="runBtn">▶</button>
    </div>

    <div id="statusLabel">Checking: none</div>

    <!-- METRICS -->
    <div id="metrics">
        <div><strong>Median Latency:</strong> <span id="metricLatency">0 ms</span></div>
        <div><strong>Resolvers Updated:</strong> <span id="metricUpdated">0</span>/40</div>
    </div>

    <!-- TABLE -->
    <table id="resolverTable">
        <thead>
            <tr>
                <th>Resolver</th>
                <th>Latency</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="resolverBody"></tbody>
    </table>

</div>

<!-- RIGHT PANEL -->
<div id="rightPanel">
    <canvas id="mapCanvas"></canvas>
</div>

<script>
/* ------------------------------
   CANVAS + WIREFRAME GRID
--------------------------------*/
const canvas = document.getElementById("mapCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

/* Draw neon green wireframe globe */
function drawWireframe() {
    ctx.strokeStyle = "rgba(0,255,100,0.25)";
    ctx.lineWidth = 1;

    const w = canvas.width;
    const h = canvas.height;

    // Meridians every 15°
    for (let lon = -180; lon <= 180; lon += 15) {
        const x = ((lon + 180) / 360) * w;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
    }

    // Parallels every 15°
    for (let lat = -90; lat <= 90; lat += 15) {
        const y = ((90 - lat) / 180) * h;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
    }
}

/* ------------------------------
   RESOLVER LIST (40 nodes)
--------------------------------*/
const resolvers = [];
for (let i = 0; i < 40; i++) {
    resolvers.push({
        name: "Resolver " + (i + 1),
        lat: (Math.random() * 140) - 70,
        lon: (Math.random() * 360) - 180,
        latency: 0,
        status: "pending",
        pulseProgress: 0
    });
}

/* Convert lat/lon to canvas coords */
function project(lat, lon) {
    const x = ((lon + 180) / 360) * canvas.width;
    const y = ((90 - lat) / 180) * canvas.height;
    return { x, y };
}

/* ------------------------------
   ANIMATION LOOP
--------------------------------*/
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawWireframe();

    // Draw pulses + nodes
    resolvers.forEach(r => {
        const pos = project(r.lat, r.lon);

        // Pulse
        if (r.pulseProgress < 1) {
            r.pulseProgress += 0.01;
            ctx.strokeStyle = "rgba(0,255,100,0.6)";
            ctx.lineWidth = 2;

            const origin = project(40, -75); // US East synthetic origin
            ctx.beginPath();
            ctx.moveTo(origin.x, origin.y);
            ctx.lineTo(
                origin.x + (pos.x - origin.x) * r.pulseProgress,
                origin.y + (pos.y - origin.y) * r.pulseProgress
            );
            ctx.stroke();
        }

        // Node
        ctx.fillStyle = r.status === "ok" ? "#00ff88" : "#ff4444";
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, 4, 0, Math.PI * 2);
        ctx.fill();
    });

    requestAnimationFrame(draw);
}
draw();

/* ------------------------------
   SYNTHETIC PROPAGATION ENGINE
--------------------------------*/
function runCheck(domain) {
    document.getElementById("statusLabel").textContent = "Checking: " + domain;

    let latencies = [];

    resolvers.forEach(r => {
        r.latency = Math.floor(Math.random() * 180) + 20;
        r.status = r.latency < 150 ? "ok" : "slow";
        r.pulseProgress = 0;
        latencies.push(r.latency);
    });

    // Update metrics
    latencies.sort((a, b) => a - b);
    const median = latencies[Math.floor(latencies.length / 2)];
    document.getElementById("metricLatency").textContent = median + " ms";
    document.getElementById("metricUpdated").textContent = resolvers.length;

    // Update table
    const body = document.getElementById("resolverBody");
    body.innerHTML = "";
    resolvers.forEach(r => {
        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${r.name}</td>
            <td>${r.latency} ms</td>
            <td style="color:${r.status === "ok" ? "#00ff88" : "#ff4444"}">${r.status}</td>
        `;
        body.appendChild(row);
    });
}

/* ------------------------------
   BUTTON + INPUT HANDLER
--------------------------------*/
document.getElementById("runBtn").addEventListener("click", () => {
    const domain = document.getElementById("domainField").value.trim();
    if (domain.length > 0) runCheck(domain);
});
</script>

</body>
</html>
