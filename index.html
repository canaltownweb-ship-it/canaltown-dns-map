<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DNS Nodes (Static View)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        background: #0b0f17;
        color: #d7e9ff;
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 30px;
    }

    h1 {
        margin-top: 0;
        font-size: 1.4rem;
        color: #4fd1ff;
    }

    ul {
        list-style: none;
        padding: 0;
        margin-top: 20px;
        max-width: 500px;
    }

    li {
        background: #111827;
        border: 1px solid #1b2433;
        padding: 14px;
        border-radius: 8px;
        margin-bottom: 12px;
    }

    .label {
        font-weight: 600;
        color: #4fd1ff;
    }

    .status-ok { color: #00e38a; }
    .status-bad { color: #ff4b5c; }
    .status-pending { color: #f6c453; }
</style>
</head>
<body>

<h1>DNS Nodes (Static Status View)</h1>

<p>This version is fully static. No scripts, no network calls, no external content.</p>

<ul>
    <li>
        <div class="label">Google DNS (US)</div>
        <div class="status-pending">Status: Pending</div>
    </li>

    <li>
        <div class="label">Google DNS (EU)</div>
        <div class="status-pending">Status: Pending</div>
    </li>

    <li>
        <div class="label">Google DNS (Asia)</div>
        <div class="status-pending">Status: Pending</div>
    </li>

    <li>
        <div class="label">Google DNS (Anycast)</div>
        <div class="status-pending">Status: Pending</div>
    </li>
</ul>

</body>
</html>
