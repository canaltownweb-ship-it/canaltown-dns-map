<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Canaltown Digital DNS Propagation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        background: #0d0f12;
        font-family: "Inter", sans-serif;
        color: #7ec8ff;
        display: flex;
        justify-content: center;
        padding: 40px;
    }

    #dns-tool {
        width: 100%;
        max-width: 900px;
    }

    #dns-input-row {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    #dns-domain {
        flex: 1;
        padding: 12px 16px;
        background: #0d0f12;
        border: 1px solid #1f242c;
        border-radius: 8px;
        color: #7ec8ff;
        font-size: 1rem;
    }

    #dns-check-btn {
        padding: 12px 20px;
        background: #1a73e8;
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: 600;
        cursor: pointer;
    }

    #dns-map-container {
        position: relative;
        width: 100%;
        height: 500px;
        background: #0d0f12;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.45);
    }

    #dns-domain-label {
        position: absolute;
        top: 20px;
        left: 20px;
        color: #7ec8ff;
        font-size: 1.2rem;
        font-weight: 600;
        text-shadow: 0 0 12px rgba(126,200,255,0.6);
    }

    #dnsMap {
        width: 100%;
        height: 100%;
    }
</style>
</head>

<body>

<div id="dns-tool">
    <div id="dns-input-row">
        <input id="dns-domain" type="text" placeholder="Enter a domain (example.com)">
        <button id="dns-check-btn">Check DNS</button>
    </div>

    <div id="dns-map-container">
        <canvas id="dnsMap"></canvas>
        <div id="dns-domain-label">example.com</div>
    </div>
</div>

<script>
const canvas = document.getElementById("dnsMap");
const ctx = canvas.getContext("2d");
canvas.width = canvas.offsetWidth;
canvas.height = canvas.offsetHeight;

let currentDomain = "example.com";

const nodes = [
  { name: "New York", x: 0.32, y: 0.35, resolver: "8.8.8.8" },
  { name: "London", x: 0.50, y: 0.28, resolver: "1.1.1.1" },
  { name: "Berlin", x: 0.54, y: 0.30, resolver: "9.9.9.9" },
  { name: "Tokyo", x: 0.82, y: 0.38, resolver: "8.8.4.4" },
  { name: "Sydney", x: 0.90, y: 0.75, resolver: "1.0.0.1" },
  { name: "São Paulo", x: 0.38, y: 0.70, resolver: "208.67.222.222" }
];

async function checkDNS(domain) {
  try {
    const response = await fetch(
      `https://dns.google/resolve?name=${domain}&type=A`
    );
    const data = await response.json();
    return data.Answer ? true : false;
  } catch {
    return false;
  }
}

async function updateNodeStatuses() {
  for (const node of nodes) {
    node.status = await checkDNS(currentDomain);
  }
}

function drawMap() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#0d0f12";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  nodes.forEach((node) => {
    const px = node.x * canvas.width;
    const py = node.y * canvas.height;

    ctx.strokeStyle = node.status ? "rgba(255,200,0,0.5)" : "rgba(255,0,0,0.4)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(canvas.width / 2, canvas.height / 2);
    ctx.lineTo(px, py);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(px, py, 10, 0, Math.PI * 2);
    ctx.fillStyle = node.status ? "#00ff88" : "#ff4444";
    ctx.shadowBlur = 20;
    ctx.shadowColor = node.status ? "#00ff88" : "#ff4444";
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  requestAnimationFrame(drawMap);
}

document.getElementById("dns-check-btn").addEventListener("click", () => {
  const input = document.getElementById("dns-domain").value.trim();
  if (!input) return;

  currentDomain = input;
  document.getElementById("dns-domain-label").textContent = input;

  updateNodeStatuses();
});

updateNodeStatuses();
setInterval(updateNodeStatuses, 15000);
drawMap();
</script>

</body>
</html>
